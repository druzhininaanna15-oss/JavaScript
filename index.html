<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1 class="logo">To Do List</h1>
        <nav class="nav">
          <a href="index.html" class="nav__link nav__link--active">To Do</a>
          <a href="kanban.html" class="nav__link">Kanban</a>
          <a href="habits.html" class="nav__link">Привычки</a>
        </nav>
      </div>
    </header>
    <main class="main">
      <form class="task-form">
        <input type="text" class="task-input" placeholder="новая задача" />
        <button type="submit" class="add-button">добавить</button>
      </form>

      <div class="task-panel">
        <input type="text" class="search-input" placeholder="поиск задач" />
        <button class="task-button">все</button>
        <button class="task-button">Активные</button>
        <button class="task-button">Завершённые</button>
        <select id="sortOrder" class="task-button">
          <option value="old">Сначала старые</option>
          <option value="new">Сначала новые</option>
          <option value="az">По значению</option>
          <option value="za">По названию</option>
        </select>
      </div>

      <section class="tasks">
        <article class="task">
          <div class="task-content">
            <h3 class="task-title"></h3>
          </div>
          <div class="task-btn">
            <button class="task__btn-edit"></button>
            <button class="task__btn-delete"></button>
          </div>
        </article>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
